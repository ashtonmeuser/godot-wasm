  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Packages
        run: python -m pip install scons pywin32

      - name: Download Wasmer Library
        run: |
          Import-Module BitsTransfer
          Start-BitsTransfer -Source "https://github.com/wasmerio/wasmer/releases/download/${{ env.WASMER_VERSION }}/wasmer-windows-amd64.tar.gz" -Destination "${{ github.workspace }}\wasmer-windows-amd64.tar.gz"
          New-Item "${{ github.workspace }}\wasmer" -itemType Directory
          tar -xzf ${{ github.workspace }}\wasmer-windows-amd64.tar.gz -C wasmer

      - name: Submodule Hash
        run: echo "SUBMODULE_HASH=$( git rev-parse HEAD:godot-cpp )" >> $GITHUB_ENV

      - name: Cache Godot Library
        id: cache-godot-cpp
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/godot-cpp/bin
            ${{ github.workspace }}/godot-cpp/include
            ${{ github.workspace }}/godot-cpp/godot-headers/**/*.h
          key: ${{ runner.os }}-${{ env.SUBMODULE_HASH }}-${{ secrets.GODOT_CPP_CACHE_VERSION }}

      - name: Compile Godot Library
        if: steps.cache-godot-cpp.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}\godot-cpp
          scons platform=windows target=release generate_bindings=yes -j3

      - name: MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile Addon
        run: scons platform=windows target=release

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows
          path: ${{ github.workspace }}\${{ env.LIBRARY_PATH }}\windows
          if-no-files-found: error

